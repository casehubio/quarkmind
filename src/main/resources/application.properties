quarkus.application.name=quarkmind-agent

# Force Quarkus to scan casehub-persistence-memory for CDI beans (no Jandex index in that jar)
quarkus.index-dependency.casehub-persistence-memory.group-id=io.casehub
quarkus.index-dependency.casehub-persistence-memory.artifact-id=casehub-persistence-memory

# Game loop tick interval (mock mode)
starcraft.tick.interval=500ms

# SC2 connection (used in %sc2 profile only)
%sc2.starcraft.sc2.host=127.0.0.1
%sc2.starcraft.sc2.port=8168

# SC2 game settings (used in %sc2 profile)
%sc2.starcraft.sc2.map=Simple128
%sc2.starcraft.sc2.difficulty=VERY_EASY
%sc2.starcraft.sc2.opponent-race=RANDOM

# Disable scheduler in test unless explicitly enabled
%test.quarkus.scheduler.enabled=false
# Use a random available port for @QuarkusTest — prevents "port already bound" failures
# when a previous test run didn't release 8081, or multiple test suites run in parallel
%test.quarkus.http.test-port=0

# Replay profile — drives the agent loop from a real .SC2Replay file (observe-only)
# Run with: mvn quarkus:dev -Dquarkus.profile=replay
%replay.starcraft.replay.file=replays/aiarena_protoss/Nothing_4720936.SC2Replay
%replay.starcraft.replay.player=1

# SmallRye in-memory channel — economics tick events (FlowEconomicsTask → EconomicsFlow)
# No explicit connector needed — SmallRye auto-discovers producer-consumer pairs on memory channels

# Global log file rotation guard — applies to any profile that enables file logging.
# Caps any single log file at 4G; 0 backups means the rotated file overwrites rather than
# accumulating. Prevents invisible disk exhaustion when logs are left running unattended.
quarkus.log.file.rotation.max-file-size=4G
quarkus.log.file.rotation.max-backup-index=0

# Graceful shutdown — gives in-flight requests, async channels, and file handles time to close.
# Default is already 10S but making it explicit. Prevents the "deleted-open-file" disk space
# leak: on Ctrl+C, the JVM closes all log file handles before exiting.
quarkus.shutdown.timeout=10S

# Emulated SC2 profile — physics simulation, no real SC2 binary needed
# Run with: mvn quarkus:dev -Dquarkus.profile=emulated
# Phase E1: probe-driven mineral harvesting

# File logging for emulated mode — debug output to /tmp for grepping without terminal copy-paste.
# Rotation prevents unbounded growth (161GB invisible disk usage was observed in a similar setup
# when the log was deleted while Java held it open — disk freed only when JVM exited).
#
# IMPORTANT: if you need to delete /tmp/quarkmind-emulated.log, kill Java first:
#   pkill -f 'quarkus:dev' && sleep 2 && rm /tmp/quarkmind-emulated.log
# Deleting the file while Java has it open leaves an invisible open-file descriptor;
# lsof -c java | grep deleted will show it; disk space is only freed when the JVM exits.
# Scouting: emulated map is 64x64 tiles; real SC2 maps are 256x256.
# estimatedEnemyBase() uses mapWidth to compute far-corner coordinates within bounds.
%emulated.scouting.map.width=64

%emulated.emulated.active=true
%emulated.quarkus.log.file.enable=true
%emulated.quarkus.log.file.path=/tmp/quarkmind-emulated.log
%emulated.quarkus.log.file.level=DEBUG
%emulated.quarkus.log.file.rotation.max-file-size=20M
%emulated.quarkus.log.file.rotation.max-backup-index=3
%emulated.quarkus.log.file.rotation.rotate-on-boot=true

# Tactics strategy selection
quarkmind.tactics.kite.strategy=direct
quarkmind.tactics.focus-fire.strategy=lowest-hp
%emulated.quarkmind.tactics.kite.strategy=terrain-aware

# --- casehub-ledger (Layer 4) ---
# DefaultOutcomeRecorder throws ISE if this is absent and OutcomeRecord.attestorId is null
casehub.ledger.outcome.default-attestor-id=quarkmind:game-engine@v1

# %test profile: in-memory ledger, no JPA datasource needed
# casehub-ledger bundles JPA entities; disable Hibernate in test to avoid the "datasource not configured" boot failure
%test.quarkus.hibernate-orm.enabled=false

# --- casehub-qhorus (Layer 3) ---
# qhorus ships quarkus.hibernate-orm.qhorus.* and quarkus.flyway.qhorus.* in its own
# application.properties; quarkmind only needs to provide the datasource URL.
# H2 in-memory for all non-sc2 profiles; %sc2 requires a real Postgres URL.
quarkus.datasource."qhorus".db-kind=h2
quarkus.datasource."qhorus".jdbc.url=jdbc:h2:mem:qhorus;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%test.quarkus.datasource."qhorus".db-kind=h2
%test.quarkus.datasource."qhorus".jdbc.url=jdbc:h2:mem:qhorus;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%test.quarkus.arc.selected-alternatives=\
  io.casehub.ledger.memory.InMemoryLedgerEntryRepository,\
  io.casehub.ledger.memory.InMemoryLedgerMerkleFrontierRepository,\
  io.casehub.ledger.memory.InMemoryActorTrustScoreRepository,\
  io.casehub.ledger.memory.InMemoryKeyRotationRepository,\
  io.casehub.ledger.memory.InMemoryAgentSigner,\
  io.casehub.ledger.memory.InMemoryActorIdentityBindingRepository,\
  io.casehub.ledger.memory.InMemoryReactiveLedgerEntryRepository,\
  io.casehub.ledger.memory.InMemoryReactiveKeyRotationRepository
%test.quarkus.index-dependency.casehub-ledger-memory.group-id=io.casehub
%test.quarkus.index-dependency.casehub-ledger-memory.artifact-id=casehub-ledger-memory
%test.casehub.ledger.hash-chain.enabled=false

# %mock profile: same 8 alternatives (default dev profile, no SC2 needed)
%mock.quarkus.arc.selected-alternatives=\
  io.casehub.ledger.memory.InMemoryLedgerEntryRepository,\
  io.casehub.ledger.memory.InMemoryLedgerMerkleFrontierRepository,\
  io.casehub.ledger.memory.InMemoryActorTrustScoreRepository,\
  io.casehub.ledger.memory.InMemoryKeyRotationRepository,\
  io.casehub.ledger.memory.InMemoryAgentSigner,\
  io.casehub.ledger.memory.InMemoryActorIdentityBindingRepository,\
  io.casehub.ledger.memory.InMemoryReactiveLedgerEntryRepository,\
  io.casehub.ledger.memory.InMemoryReactiveKeyRotationRepository
%mock.quarkus.index-dependency.casehub-ledger-memory.group-id=io.casehub
%mock.quarkus.index-dependency.casehub-ledger-memory.artifact-id=casehub-ledger-memory
%mock.casehub.ledger.hash-chain.enabled=false

# %emulated profile: physics simulation, no SC2 needed
%emulated.quarkus.arc.selected-alternatives=\
  io.casehub.ledger.memory.InMemoryLedgerEntryRepository,\
  io.casehub.ledger.memory.InMemoryLedgerMerkleFrontierRepository,\
  io.casehub.ledger.memory.InMemoryActorTrustScoreRepository,\
  io.casehub.ledger.memory.InMemoryKeyRotationRepository,\
  io.casehub.ledger.memory.InMemoryAgentSigner,\
  io.casehub.ledger.memory.InMemoryActorIdentityBindingRepository,\
  io.casehub.ledger.memory.InMemoryReactiveLedgerEntryRepository,\
  io.casehub.ledger.memory.InMemoryReactiveKeyRotationRepository
%emulated.quarkus.index-dependency.casehub-ledger-memory.group-id=io.casehub
%emulated.quarkus.index-dependency.casehub-ledger-memory.artifact-id=casehub-ledger-memory
%emulated.casehub.ledger.hash-chain.enabled=false

# %replay profile: replay mode, no SC2 datasource
%replay.quarkus.arc.selected-alternatives=\
  io.casehub.ledger.memory.InMemoryLedgerEntryRepository,\
  io.casehub.ledger.memory.InMemoryLedgerMerkleFrontierRepository,\
  io.casehub.ledger.memory.InMemoryActorTrustScoreRepository,\
  io.casehub.ledger.memory.InMemoryKeyRotationRepository,\
  io.casehub.ledger.memory.InMemoryAgentSigner,\
  io.casehub.ledger.memory.InMemoryActorIdentityBindingRepository,\
  io.casehub.ledger.memory.InMemoryReactiveLedgerEntryRepository,\
  io.casehub.ledger.memory.InMemoryReactiveKeyRotationRepository
%replay.quarkus.index-dependency.casehub-ledger-memory.group-id=io.casehub
%replay.quarkus.index-dependency.casehub-ledger-memory.artifact-id=casehub-ledger-memory
%replay.casehub.ledger.hash-chain.enabled=false
